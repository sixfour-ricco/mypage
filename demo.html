<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>マイページ</title>
<style>
  :root{ --bg:#eceae4; --ink:#2c2a22; --sub:#8a8578; }
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body{ margin:0; }
  body{ font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Yu Gothic",sans-serif;
    background:radial-gradient(120% 80% at 50% -10%, #f4f2ec 0%, var(--bg) 55%, #e2e0d8 100%);
    min-height:100vh; color:var(--ink); padding:24px 14px 60px; }
  .wrap{ max-width:410px; margin:0 auto; }
  .head{ text-align:center; margin-bottom:18px; }
  .head .brandmark{ font-size:11px; letter-spacing:.34em; color:var(--sub); text-transform:uppercase; margin-bottom:8px; padding-left:.34em; }
  .head .who{ font-size:28px; font-weight:600; letter-spacing:.02em; }
  .head .memberno{ display:inline-block; margin-top:9px; font-size:22px; font-weight:600; color:#6b6250; font-family:"SFMono-Regular",Consolas,"Courier New",monospace; letter-spacing:.14em; }
  .rank-badge{ margin-top:13px; display:inline-flex; gap:9px; align-items:center; font-size:11.5px; padding:7px 15px 7px 12px; border-radius:22px; letter-spacing:.03em; box-shadow:0 3px 10px -4px rgba(90,70,40,.4), 0 0 0 1px rgba(255,255,255,.4) inset; }
  .rank-badge .rk{ font-size:10px; font-weight:800; letter-spacing:.1em; }
  .rank-badge b{ font-weight:700; }
  .rank-badge .dot{ width:3px; height:3px; border-radius:50%; opacity:.5; background:currentColor; }
  .rank-badge svg{ display:block; }
  .tenure-note{ font-size:10px; color:var(--sub); margin-top:9px; letter-spacing:.02em; }
  .sec-label{ display:flex; align-items:center; gap:10px; font-size:11px; letter-spacing:.18em; color:var(--sub); margin:22px 4px 12px; }
  .sec-label::after{ content:""; flex:1; height:1px; background:rgba(0,0,0,.09); }
  .card{ position:relative; border-radius:16px; padding:18px 20px 16px; margin-bottom:14px; overflow:hidden; isolation:isolate; transition:transform .18s ease; }
  .card:active{ transform:scale(.99); }
  .card-top{ display:flex; justify-content:space-between; align-items:center; margin-bottom:12px; }
  .brand-logo{ width:auto; display:block; }
  .ricco .brand-logo{ height:18px; }
  .sixfour .brand-logo{ height:25px; }
  .card-no{ font-family:"SFMono-Regular",Consolas,"Courier New",monospace; font-size:22px; font-weight:600; letter-spacing:.12em; opacity:.92; }
  .mid{ display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; gap:10px; }
  .mid-left{ min-width:0; }
  .card-name{ font-size:30px; font-weight:600; letter-spacing:.03em; line-height:1.05; margin-bottom:4px; }
  .card-sub{ font-size:12.5px; opacity:.82; }
  .specs{ text-align:center; flex:none; }
  .specs .gimg{ display:block; width:84px; height:auto; margin:0 auto; }
  .mini-row{ display:flex; align-items:center; justify-content:center; gap:2px; margin-top:8px; height:22px; }
  .mini-row .cnt{ font-size:10px; opacity:.72; margin-left:4px; font-weight:600; }
  .w-grid{ display:flex; gap:10px; padding-top:12px; border-top:1px solid rgba(0,0,0,.08); }
  .w-cell{ flex:1; display:flex; align-items:center; gap:9px; min-width:0; }
  .w-texts{ min-width:0; }
  .w-label{ font-size:10.5px; opacity:.72; display:flex; align-items:center; gap:5px; margin-bottom:2px; white-space:nowrap; }
  .w-date{ font-size:15px; font-weight:600; font-variant-numeric:tabular-nums; letter-spacing:.01em; }
  .u15{ font-size:8.5px; font-weight:800; letter-spacing:.05em; padding:2px 5px; border-radius:4px; line-height:1; background:#2f6bd8; color:#fff; }
  .u15-note{ font-size:10.5px; opacity:.62; margin-top:10px; letter-spacing:.01em; }
  .lens-badge{ display:inline-block; font-size:9px; font-weight:700; letter-spacing:.04em; padding:2px 7px; border-radius:5px; background:rgba(120,100,70,.16); color:#6b5c3a; margin-left:8px; vertical-align:2px; }
  .ring{ position:relative; width:46px; height:46px; flex:none; }
  .ring svg{ transform:rotate(-90deg); display:block; }
  .ring .rtxt{ position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; line-height:1.02; }
  .ring .rtxt .r1{ font-size:7px; opacity:.62; }
  .ring .rtxt .r2{ font-size:13px; font-weight:700; font-variant-numeric:tabular-nums; }
  .ring .rtxt .r3{ font-size:7px; opacity:.62; }
  .ring .rtxt .rsm{ font-size:9px; font-weight:700; opacity:.55; }
  .link{ display:block; text-align:center; margin-top:14px; padding:10px; border-radius:10px; text-decoration:none; font-size:12px; font-weight:600; letter-spacing:.06em; }
  .sixfour{ background:linear-gradient(152deg,#ffffff 0%,#fbfbf9 42%,#f2f1ec 100%); box-shadow:0 10px 26px -10px rgba(140,120,60,.28), 0 1px 0 rgba(255,255,255,.9) inset, 0 0 0 1px rgba(0,0,0,.04); color:#2c2a22; }
  .sixfour::before{ content:""; position:absolute; top:-40%; left:-20%; width:80%; height:120%; background:linear-gradient(90deg,transparent,rgba(255,255,255,.55),transparent); transform:rotate(18deg); z-index:-1; }
  .sixfour .link{ background:#b5182b; color:#fff; }
  .ricco{ background:linear-gradient(157deg,#d9d3c5 0%,#cfc8b7 52%,#c4bca7 100%); box-shadow:0 12px 28px -12px rgba(90,78,50,.4), 0 0 0 1px rgba(150,130,85,.28) inset; color:#3a342a; }
  .ricco .card-no{ color:#7a6b47; }
  .ricco .w-grid{ border-top-color:rgba(70,60,40,.16); }
  .ricco .link{ background:transparent; color:#6b5c3a; box-shadow:0 0 0 1px rgba(120,102,60,.45) inset; }
  .card.archived{ background:linear-gradient(155deg,#e8e0d2,#ddd3c0); filter:sepia(.35) saturate(.85); box-shadow:0 4px 14px -8px rgba(90,70,40,.3), 0 0 0 1px rgba(0,0,0,.05); color:#6a6151; }
  .card.archived .brand-logo{ filter:sepia(.6) opacity(.7); }
  .card.archived .link{ display:none; }
  .archived-stamp{ position:absolute; top:14px; right:15px; font-size:9px; letter-spacing:.14em; color:#a08a5c; border:1px solid currentColor; border-radius:4px; padding:2px 7px; transform:rotate(4deg); }
  .archived-msg{ margin-top:12px; padding-top:11px; border-top:1px dashed rgba(120,100,70,.3); font-size:11.5px; line-height:1.6; color:#7c7059; }
  .archived-msg b{ color:#5f553f; font-weight:600; }
  .archive-toggle{ width:100%; text-align:left; background:none; border:none; cursor:pointer; display:flex; align-items:center; gap:9px; padding:10px 6px; font-size:12px; color:var(--sub); letter-spacing:.06em; }
  .archive-toggle .chev{ transition:transform .2s ease; font-size:10px; }
  .archive-toggle.open .chev{ transform:rotate(90deg); }
  .archive-wrap{ display:none; }
  .archive-wrap.open{ display:block; animation:fade .25s ease; }
  @keyframes fade{ from{opacity:0; transform:translateY(-4px);} to{opacity:1; transform:none;} }
  .foot{ text-align:center; margin-top:32px; font-size:10px; color:var(--sub); letter-spacing:.1em; }
  .demobar{ max-width:410px; margin:0 auto 8px; display:flex; gap:6px; justify-content:center; }
  .demobar button{ flex:1; padding:8px 4px; border:1px solid rgba(0,0,0,.12); background:#fff; border-radius:9px; font-size:11px; cursor:pointer; color:#555; }
  .demobar button.on{ background:#2c2a22; color:#fff; border-color:#2c2a22; }
  .demonote{ max-width:410px; margin:0 auto 18px; font-size:10.5px; color:var(--sub); text-align:center; line-height:1.5; }
  .aging-intro{ text-align:center; font-size:13px; line-height:1.7; color:#5a5548; margin:6px 4px 20px; }
  .aging-intro b{ color:var(--ink); }
  .aging-grid{ display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px; }
  .aging-card{ background:linear-gradient(152deg,#fff,#f3f1ec); border-radius:14px; padding:16px 6px 12px; text-align:center; box-shadow:0 6px 16px -10px rgba(120,100,60,.3), 0 0 0 1px rgba(0,0,0,.04); }
  .aging-card .gimg{ width:78px; height:auto; display:block; margin:0 auto 8px; }
  .aging-card .yl{ font-size:12px; font-weight:700; }
  .aging-card .yd{ font-size:9.5px; color:var(--sub); margin-top:2px; }

  /* メッセージ画面（登録完了・初対面・会員証なし 等） */
  .msg-card{ border-radius:16px; padding:26px 22px; margin-bottom:14px; line-height:1.9; font-size:14px; }
  .msg-card.sixfour{ background:linear-gradient(152deg,#ffffff 0%,#fbfbf9 42%,#f2f1ec 100%); box-shadow:0 10px 26px -10px rgba(140,120,60,.28), 0 0 0 1px rgba(0,0,0,.04); color:#2c2a22; }
  .msg-card.ricco{ background:linear-gradient(157deg,#d9d3c5 0%,#cfc8b7 52%,#c4bca7 100%); box-shadow:0 12px 28px -12px rgba(90,78,50,.4), 0 0 0 1px rgba(150,130,85,.28) inset; color:#3a342a; }
  .msg-brand{ font-size:10px; letter-spacing:.2em; opacity:.55; margin-bottom:12px; }
  .msg-sub{ font-size:11px; opacity:.6; margin-top:14px; padding-top:12px; border-top:1px solid rgba(0,0,0,.08); }

  /* 度数問い合わせ */
  .pw-card{ border-radius:16px; padding:22px; margin-bottom:14px; }
  .pw-card.sixfour{ background:linear-gradient(152deg,#ffffff,#f2f1ec); box-shadow:0 10px 26px -10px rgba(140,120,60,.28), 0 0 0 1px rgba(0,0,0,.04); color:#2c2a22; }
  .pw-card.ricco{ background:linear-gradient(157deg,#d9d3c5,#c4bca7); box-shadow:0 12px 28px -12px rgba(90,78,50,.4), 0 0 0 1px rgba(150,130,85,.28) inset; color:#3a342a; }
  .pw-title{ font-size:15px; font-weight:700; margin-bottom:6px; }
  .pw-lead{ font-size:12.5px; opacity:.8; margin-bottom:12px; }
  .pw-opt{ display:block; padding:11px 14px; border-radius:10px; margin-bottom:8px; font-size:13px; background:rgba(255,255,255,.55); box-shadow:0 0 0 1px rgba(0,0,0,.07) inset; }
  .ricco .pw-opt{ background:rgba(255,255,255,.4); box-shadow:0 0 0 1px rgba(90,78,50,.18) inset; }
  .pw-note{ font-size:11px; opacity:.68; line-height:1.7; margin-top:12px; }
  .pw-tips{ margin-top:14px; padding-top:12px; border-top:1px dashed rgba(120,100,70,.35); font-size:11.5px; line-height:1.75; opacity:.82; }

  /* ランク昇格 */
  .up-card{ border-radius:16px; padding:24px 22px; margin-bottom:12px; text-align:center; line-height:1.85; font-size:13.5px; }
  .up-rank{ font-size:13px; font-weight:800; letter-spacing:.14em; margin-bottom:10px; }
  .up-badge{ display:inline-block; padding:6px 16px; border-radius:20px; margin-bottom:12px; font-size:11px; font-weight:800; letter-spacing:.1em; }
</style>
</head>
<body>
<div class="demobar">
  <button id="tab-naoyuki" class="on" onclick="showSet('naoyuki')">橋本さん</button>
  <button id="tab-simple" onclick="showSet('simple')">Sixfourだけ</button>
  <button id="tab-aging" onclick="showSet('aging')">育ち方</button>
</div>
<div class="demobar">
  <button id="tab-first" onclick="showSet('first')">はじめての人</button>
  <button id="tab-grad" onclick="showSet('grad')">保証期間終了</button>
  <button id="tab-power" onclick="showSet('power')">度数問合せ</button>
</div>
<div class="demobar">
  <button id="tab-rank" onclick="showSet('rank')">ランク昇格</button>
  <button id="tab-none" onclick="showSet('none')">会員証なし</button>
  <button id="tab-warn" onclick="showSet('warn')">保証まもなく</button>
</div>
<div class="demonote" id="demonote">※デモ表示です。「（息子）」等の続柄は説明用で、実際のカードには名前のみ表示されます。</div>

    <div class="brandmark">Members Card</div>

    <div id="tenureWrap"></div>
  </div>
  <div id="app"></div>
  <div class="foot">SIXFOUR ／ RICCO</div>
</div>

  // フレーム着色＋レンズにキズ（味のあるエイジング）。レンズ色は変えない。
  function tint(frameColor, wpx, months){
    if(!ready) return "";
    var w=wpx, h=Math.round(wpx*glassImg.height/glassImg.width);
    var dpr=window.devicePixelRatio||1;
    var cv=document.createElement("canvas"); cv.width=w*dpr; cv.height=h*dpr;
    var ctx=cv.getContext("2d"); ctx.scale(dpr,dpr);
    ctx.drawImage(glassImg,0,0,w,h);
    ctx.globalCompositeOperation="source-in";
    ctx.fillStyle=frameColor; ctx.fillRect(0,0,w,h);
    // キズ（半年ごとに増える細いヘアライン）
    if(months>=12){
      var sc=document.createElement("canvas"); sc.width=w*dpr; sc.height=h*dpr;
      var s=sc.getContext("2d"); s.scale(dpr,dpr);
      var n = months<36 ? 1 : 2;   // 1〜2本だけ・控えめ
      s.strokeStyle="rgba(95,82,68,0.16)"; s.lineWidth=0.55; s.lineCap="round";
      var lens=[[0.27,0.47],[0.73,0.47]], rr=w*0.07;   // 短く
      for(var li=0; li<2; li++){
        var cx=w*lens[li][0], cy=h*lens[li][1];
        for(var k=0;k<n;k++){
          var a=-0.5;
          var dx=Math.cos(a)*rr, dy=Math.sin(a)*rr, off=(k-(n-1)/2)*6;
          s.beginPath(); s.moveTo(cx-dx, cy-dy+off); s.lineTo(cx+dx, cy+dy+off); s.stroke();
        }
      }
      s.globalCompositeOperation="destination-in"; s.drawImage(lensImg,0,0,w,h);
      ctx.globalCompositeOperation="source-over"; ctx.drawImage(sc,0,0,w,h);
    }
    return cv.toDataURL();
  }

    var isRicco=card.brand==="RICCO", cls=isRicco?"ricco":"sixfour";
    var logo=isRicco?LOGO_RICCO:LOGO_SIX;
    var mgcol=isRicco?"#7a6b47":"#9a8f80";
    var u15=card.isU15?' <span class="u15">U15</span>':'';
    var gsrc=tint(ageColor(card.months), 84, card.months);
    var frameCell;
    if(card.lensOnly){
      frameCell='<div class="w-cell">'+ringNA("対象外",isRicco)+
        '<div class="w-texts"><div class="w-label">メガネ・サングラス保証</div><div class="w-date" style="font-size:12.5px;opacity:.6">レンズ交換のため対象外</div></div></div>';
    } else {
      frameCell='<div class="w-cell">'+ring(card.frameActive,card.frameRatio,card.frameDays,isRicco)+
        '<div class="w-texts"><div class="w-label">メガネ・サングラス保証</div><div class="w-date">'+card.frameEnd+'</div></div></div>';
    }
    var lensBadge = card.lensOnly ? '<span class="lens-badge">レンズ交換</span>' : '';
    var html='<div class="card '+cls+'">'+
      '<div class="card-top"><img class="brand-logo" src="'+logo+'" alt=""><div class="card-no">'+card.memberNo+'</div></div>'+
      '<div class="mid"><div class="mid-left"><div class="card-name">'+card.name+lensBadge+'</div><div class="card-sub">'+card.sub+'</div></div>'+
        '<div class="specs"><img class="gimg" src="'+gsrc+'" alt="">'+countGlasses(card.brandCount, mgcol)+'</div></div>'+
      '<div class="w-grid">'+ frameCell +
        '<div class="w-cell">'+ring(card.visionActive,card.visionRatio,card.visionDays,isRicco)+
          '<div class="w-texts"><div class="w-label">見え方保証'+u15+'</div><div class="w-date">'+card.visionEnd+'</div></div></div>'+
      '</div>';
    if(card.isU15){ var u15txt = isRicco ? '15歳以下のお客様は、見え方保証を6ヶ月とさせていただいております。' : '15歳以下のお客様は、見え方保証を6ヶ月に延長しています。'; html+='<div class="u15-note">'+u15txt+'</div>'; }

    return html;
  }
  function archivedCard(card){
    var gsrc=tint(ageColor(card.months), 84, card.months);
    return '<div class="card sixfour archived"><div class="archived-stamp">ARCHIVE</div>'+
      '<div class="card-top"><img class="brand-logo" src="'+LOGO_SIX+'" alt=""><div class="card-no">'+card.memberNo+'</div></div>'+
      '<div class="mid"><div class="mid-left"><div class="card-name">'+card.name+'</div><div class="card-sub">'+card.sub+'</div></div>'+
        '<div class="specs"><img class="gimg" src="'+gsrc+'" alt=""></div></div>'+
      '<div class="w-grid"><div class="w-cell"><div class="w-texts"><div class="w-label">メガネ・サングラス保証</div><div class="w-date">'+card.frameEnd+'</div></div></div>'+
        '<div class="w-cell"><div class="w-texts"><div class="w-label">見え方保証</div><div class="w-date">'+card.visionEnd+'</div></div></div></div>'+

  function renderCards(setKey){
    var set=DATA[setKey];
    document.getElementById("whoName").textContent=set.name;
    document.getElementById("whoNo").textContent=set.no;
    var rk=rankOf(set.total);
    var note = set.manual ? '<div class="tenure-note">※ランク・本数はスタッフが設定できます（LINE登録前のご購入も反映）</div>' : '';
    document.getElementById("tenureWrap").innerHTML=
      '<div class="rank-badge" style="background:'+rk.grad+'; color:'+rk.text+'">'+
        badgeGlasses(rk.icon)+'<span class="rk">'+rk.name+'</span><span class="dot"></span><span>通算 <b>'+set.total+'本</b></span></div>'+note;
    var active=set.cards.filter(function(c){return !c.archived;});
    var archived=set.cards.filter(function(c){return c.archived;});
    active.sort(function(a,b){return (b.brand==="RICCO")-(a.brand==="RICCO");});
    var html='<div class="sec-label">ご利用中のメガネ</div>';
    active.forEach(function(c){ html+=activeCard(c); });
    if(archived.length){
      html+='<button class="archive-toggle" onclick="toggleArchive(this)"><span class="chev">▶</span> 保証が終了したメガネ（'+archived.length+'本）</button><div class="archive-wrap">';
      archived.forEach(function(c){ html+=archivedCard(c); });
      html+='</div>';
    }
    document.getElementById("app").innerHTML=html;
  }
  function renderAging(){

    steps.forEach(function(m){
      var lbl = m<12 ? (m===0?"新品":(m+"ヶ月")) : (Math.floor(m/12)+"年");
      html+='<div class="aging-card"><img class="gimg" src="'+tint(ageColor(m),78,m)+'" alt=""><div class="yl">'+lbl+'</div><div class="yd">'+agingLabel(m)+'</div></div>';
    });

    document.getElementById("app").innerHTML=html;
  }

  window.toggleArchive=function(btn){ btn.classList.toggle("open"); btn.nextElementSibling.classList.toggle("open"); };
  var currentKey="naoyuki";
  window.showSet=function(key){
    currentKey=key;
    ["naoyuki","simple","aging","first","grad","power","rank","none","warn"].forEach(function(k){
      var el=document.getElementById("tab-"+k); if(el) el.classList.toggle("on",k===key);
    });
    var showHead = (key==="naoyuki"||key==="simple");
    document.getElementById("head").style.display= showHead ? "block" : "none";
    if(key==="aging"){ renderAging(); }
    else if(key==="first"){ renderFirst(); }
    else if(key==="grad"){ renderGrad(); }
    else if(key==="power"){ renderPower(); }
    else if(key==="rank"){ renderRank(); }
    else if(key==="none"){ renderNone(); }
    else if(key==="warn"){ renderWarn(); }
    else { document.getElementById("demonote").textContent="※デモ表示です。「（息子）」等の続柄は説明用で、実際のカードには名前のみ表示されます。"; renderCards(key); }
  };
  function onImg(){ if(++loaded>=2){ ready=true; showSet(currentKey); } }
  glassImg.onload=onImg; lensImg.onload=onImg;
  glassImg.src=GLASS_SRC; lensImg.src=LENS_SRC;
